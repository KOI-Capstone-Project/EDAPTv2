###############################################################################
# EDAPT v2 — docker-compose.prod.yml  (PRODUCTION)
#
# Services:  db · backend (gunicorn) · frontend (nginx-served build) · nginx
# Usage:     docker compose -f docker-compose.prod.yml up --build -d
###############################################################################

name: edaptv2-prod

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: edaptv2_db_prod
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./scripts/sql:/docker-entrypoint-initdb.d:ro
    # DB port NOT exposed — internal network only in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend (gunicorn + uvicorn workers) ───────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: edaptv2_backend_prod
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ENVIRONMENT:  production
    # Source NOT mounted — image is the source of truth in prod
    depends_on:
      db:
        condition: service_healthy
    command: >
      gunicorn app.main:app
        --worker-class uvicorn.workers.UvicornWorker
        --workers 4
        --bind 0.0.0.0:8000
        --timeout 120
        --log-level ${LOG_LEVEL:-warning}

  # ── React frontend (pre-built static files served by nginx) ───────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: edaptv2_frontend_prod
    restart: always
    # No exposed ports — nginx reverse-proxies to this container

  # ── nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: edaptv2_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"            # add your TLS certs in nginx/certs/ when ready
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data_prod:
